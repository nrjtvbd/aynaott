name: AynaOTT Super Auto Update

on:
  schedule:
    - cron: '0 */3 * * *' # প্রতি ৩ ঘণ্টা অন্তর আপডেট হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        env:
          AYNAOTT_API_URL: ${{ secrets.AYNAOTT_API_URL }}
        run: python Script/aynaott_auto.py
          
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ফাইলগুলো অ্যাড করা
          git add internal_data.json AynaOTT.m3u || echo "Files not found"
          
          # পরিবর্তন থাকলে কমিট করা
          git commit -m "📺 Auto Update: Channels ($(date))" || echo "No changes to commit"
          
          # পুশ করা
          git push || echo "No changes to push"
