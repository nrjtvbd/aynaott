name: Jagobd Final Test
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch Al Jazeera
        run: |
          # 1. Direct page fetch using curl (masking as a real browser)
          RESPONSE=$(curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www.jagobd.com/aljazeera")
          
          # 2. Extract Token using grep and sed
          TOKEN=$(echo "$RESPONSE" | grep -oP 'wmsAuthSign=[\w.~-]+' | head -1 | cut -d'=' -f2)
          
          # 3. Extract Path ID (the long code)
          PATH_ID=$(echo "$RESPONSE" | grep -oP '(?<=static.jagobd.com.bd/)[a-zA-Z0-9]{50,150}' | head -1)

          if [ -z "$TOKEN" ]; then
            # Try from iframe if main page fails
            IFRAME_URL=$(echo "$RESPONSE" | grep -oP '(?<=iframe src=")[^"]+' | head -1)
            if [[ "$IFRAME_URL" == //* ]]; then IFRAME_URL="https:$IFRAME_URL"; fi
            
            IFRAME_RES=$(curl -s -L -A "Mozilla/5.0" -e "https://www.jagobd.com/aljazeera" "$IFRAME_URL")
            TOKEN=$(echo "$IFRAME_RES" | grep -oP 'wmsAuthSign=[\w.~-]+' | head -1 | cut -d'=' -f2)
            PATH_ID=$(echo "$IFRAME_RES" | grep -oP '(?<=static.jagobd.com.bd/)[a-zA-Z0-9]{50,150}' | head -1)
          fi

          # Create M3U File
          echo "#EXTM3U" > jagobd.m3u
          if [ ! -z "$TOKEN" ]; then
            FINAL_LINK="https://static.jagobd.com.bd/${PATH_ID:-live}/aljazeera.stream/playlist.m3u8?wmsAuthSign=$TOKEN"
            echo "#EXTINF:-1, Al Jazeera" >> jagobd.m3u
            echo "#EXTVLCOPT:http-referer=https://tvz.jagobd.com/" >> jagobd.m3u
            echo "$FINAL_LINK" >> jagobd.m3u
            echo "Success: Link Found"
          else
            echo "# Error: Token not found" >> jagobd.m3u
            echo "Failed: IP Blocked"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jagobd.m3u
          git commit -m "Jagobd Update" || exit 0
          git push
