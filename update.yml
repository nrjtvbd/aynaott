- name: Fetch Jagobd Tokens
        run: |
          python -c "
          import requests
          import re

          def get_jagobd_stream(channel):
              url = f'https://www.jagobd.com/{channel}'
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  'Referer': 'https://www.jagobd.com/'
              }
              try:
                  # মূল পেজ থেকে তথ্য নেয়া
                  res = requests.get(url, headers=headers, timeout=15).text
                  
                  # ডাইনামিক সোর্স ইউআরএল খোঁজা (নতুন প্যাটার্ন)
                  stream_match = re.search(r'source:\s*\"(.*?)\"', res)
                  if stream_match:
                      return stream_match.group(1)
                  
                  # যদি সরাসরি না পাওয়া যায়, তবে আইফ্রেম সোর্স চেক করা
                  iframe_match = re.search(r'iframe src=\"(.*?)\"', res)
                  if iframe_match:
                      iframe_url = iframe_match.group(1)
                      # আইফ্রেম থেকে টোকেনসহ লিঙ্ক খোঁজা
                      res_iframe = requests.get(iframe_url, headers=headers).text
                      token_match = re.search(r'wmsAuthSign=(.*?)\"', res_iframe)
                      if token_match:
                          return f'https://static.jagobd.com.bd/live/{channel}.stream/playlist.m3u8?wmsAuthSign={token_match.group(1)}'
              except Exception as e:
                  print(f'Error fetching {channel}: {e}')
              return None

          # আপনার পছন্দের চ্যানেলগুলোর নাম (জাগোবিডি ইউআরএল অনুযায়ী)
          channels = ['aljazeera', 'somoy-tv', 'ekattor-tv', 'btv-world']
          m3u_content = '#EXTM3U\n'
          
          for ch in channels:
              stream_link = get_jagobd_stream(ch)
              if stream_link:
                  m3u_content += f'#EXTINF:-1, Jagobd {ch.upper()}\n'
                  # রেফারার ছাড়া জাগোবিডি চলবে না
                  m3u_content += f'#EXTVLCOPT:http-referer=https://tvz.jagobd.com/\n'
                  m3u_content += f'#EXTVLCOPT:http-user-agent=Mozilla/5.0\n'
                  m3u_content += f'{stream_link}\n'
          
          with open('jagobd.m3u', 'w') as f:
              f.write(m3u_content)
          print('jagobd.m3u created successfully!')
          "
